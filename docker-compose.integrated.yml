version: '3.8'

# =============================================================================
# MotoGP Analytics Platform - Integrated Docker Compose
# =============================================================================
# This compose file orchestrates all components of the MotoGP Analytics platform
# across the 4 specialized repositories.
#
# Usage:
#   docker-compose -f docker-compose.integrated.yml up -d
#
# Prerequisites:
#   1. Clone all 4 repositories in the same directory
#   2. Configure .env file with platform settings
#   3. Ensure Docker and Docker Compose are installed

services:
  # =============================================================================
  # DATABASE LAYER
  # =============================================================================
  
  database:
    image: postgres:16-alpine
    container_name: motogp-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-motogp_analytics}
      POSTGRES_USER: ${DB_USER:-motogp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motogp_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./motogp-analytics-api/database/schema:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - motogp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-motogp_user} -d ${DB_NAME:-motogp_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # CACHE LAYER
  # =============================================================================
  
  redis:
    image: redis:7-alpine
    container_name: motogp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - motogp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # API BACKEND
  # =============================================================================
  
  api:
    build:
      context: ./motogp-analytics-api
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: motogp-api
    restart: unless-stopped
    environment:
      # Database Configuration
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-motogp_analytics}
      DB_USER: ${DB_USER:-motogp_user}
      DB_PASSWORD: ${DB_PASSWORD:-motogp_secure_password}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # API Configuration
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_SECRET_KEY: ${API_SECRET_KEY:-your-super-secret-key-change-in-production-min-32-chars}
      
      # Performance
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8501}
      
      # Monitoring
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - motogp-network
    volumes:
      - ./motogp-analytics-api:/app
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # DASHBOARD FRONTEND
  # =============================================================================
  
  dashboard:
    build:
      context: ./motogp-dashboard
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: motogp-dashboard
    restart: unless-stopped
    environment:
      # API Integration
      API_BASE_URL: http://api:8000
      API_TIMEOUT: ${API_TIMEOUT:-30}
      
      # Dashboard Configuration
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: false
      
      # Features
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-MotoGP Analytics Dashboard}
      DASHBOARD_AUTO_REFRESH_INTERVAL: ${DASHBOARD_AUTO_REFRESH_INTERVAL:-300}
      DASHBOARD_ENABLE_DEMO_MODE: ${DASHBOARD_ENABLE_DEMO_MODE:-true}
      DASHBOARD_ENABLE_REALTIME: ${DASHBOARD_ENABLE_REALTIME:-true}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - motogp-network
    volumes:
      - ./motogp-dashboard:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # JUPYTER DATA SCIENCE ENVIRONMENT
  # =============================================================================
  
  jupyter:
    build:
      context: ./motogp-data-science
      dockerfile: Dockerfile
    container_name: motogp-jupyter
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: yes
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-motogp-analytics-token}
      
      # Data Science Configuration
      DATA_RAW_PATH: ${DATA_RAW_PATH:-/app/data/raw}
      DATA_INTERIM_PATH: ${DATA_INTERIM_PATH:-/app/data/interim}
      DATA_PROCESSED_PATH: ${DATA_PROCESSED_PATH:-/app/data/processed}
      
      # Model Configuration
      MODEL_RANDOM_SEED: ${MODEL_RANDOM_SEED:-42}
      MODEL_TEST_SIZE: ${MODEL_TEST_SIZE:-0.2}
      MODEL_CV_FOLDS: ${MODEL_CV_FOLDS:-5}
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    networks:
      - motogp-network
    volumes:
      - ./motogp-data-science:/app
      - jupyter_data:/home/jovyan/work
    command: start-notebook.sh --NotebookApp.token=${JUPYTER_TOKEN:-motogp-analytics-token}

  # =============================================================================
  # LOAD BALANCER & REVERSE PROXY
  # =============================================================================
  
  nginx:
    image: nginx:alpine
    container_name: motogp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - dashboard
    networks:
      - motogp-network
    volumes:
      - ./motogp-infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./motogp-infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx

  # =============================================================================
  # MONITORING STACK
  # =============================================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: motogp-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - motogp-network
    volumes:
      - ./motogp-infrastructure/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    depends_on:
      - api
      - dashboard

  grafana:
    image: grafana/grafana:latest
    container_name: motogp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_ANALYTICS_REPORTING_ENABLED: false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - motogp-network
    volumes:
      - ./motogp-infrastructure/monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # =============================================================================
  # LOG AGGREGATION
  # =============================================================================
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: motogp-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - motogp-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: motogp-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - motogp-network
    depends_on:
      - elasticsearch

  # =============================================================================
  # UTILITY SERVICES
  # =============================================================================
  
  adminer:
    image: adminer:latest
    container_name: motogp-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - motogp-network
    depends_on:
      - database

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: motogp-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - motogp-network
    depends_on:
      - redis

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  motogp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  jupyter_data:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local

# =============================================================================
# USAGE NOTES
# =============================================================================
# 
# Start the platform:
#   docker-compose -f docker-compose.integrated.yml up -d
# 
# Scale specific services:
#   docker-compose -f docker-compose.integrated.yml up -d --scale api=3
# 
# View logs:
#   docker-compose -f docker-compose.integrated.yml logs -f
# 
# Stop the platform:
#   docker-compose -f docker-compose.integrated.yml down
# 
# Clean up everything:
#   docker-compose -f docker-compose.integrated.yml down -v --rmi all
# 
# Service endpoints:
#   - API: http://localhost:8000
#   - Dashboard: http://localhost:8501
#   - Jupyter: http://localhost:8888
#   - Grafana: http://localhost:3000
#   - Prometheus: http://localhost:9090
#   - Database Admin: http://localhost:8080
#   - Redis Admin: http://localhost:8081
#   - Kibana: http://localhost:5601